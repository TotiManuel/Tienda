{% extends "base.html" %}

{% block title %}Inventario - Toti{% endblock %}

{% block content %}

<style>
.inventario-container{
    padding: 30px;
}

.inventario-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.inventario-header h2{
    font-size:28px;
}

.btn-add{
    background:#2563eb;
    color:white;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.btn-add:hover{
    background:#1e40af;
}

.search-box{
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
}

.table-container{
    background:white;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    overflow:hidden;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#f3f4f6;
}

th, td{
    padding:14px;
    text-align:left;
}

tr{
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f9fafb;
}

.action-btn{
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

.edit{
    background:#fbbf24;
    color:white;
}

.delete{
    background:#ef4444;
    color:white;
}

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:30px;
    border-radius:12px;
    width:400px;
}

.modal-content h3{
    margin-bottom:15px;
}

.modal-content input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:6px;
    border:1px solid #ddd;
}

.modal-buttons{
    display:flex;
    justify-content:flex-end;
    gap:10px;
}
</style>

<div class="inventario-container">

    <div class="inventario-header">
        <h2>Inventario</h2>
        <button class="btn-add" onclick="openModal()">+ Agregar producto</button>
    </div>

    <div class="search-box">
        <input type="text" id="search" placeholder="Buscar producto...">
    </div>

    <div class="table-container">
        <table id="tabla">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Código</th>
                    <th>Stock</th>
                    <th>Precio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tbody">

                <!-- Ejemplo -->
                <tr>
                    <td>Remera negra</td>
                    <td>R001</td>
                    <td>15</td>
                    <td>$12000</td>
                    <td>
                        <button class="action-btn edit">Editar</button>
                        <button class="action-btn delete">Eliminar</button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>

</div>


<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Producto</h3>

        <input id="nombre" placeholder="Nombre">
        <input id="codigo" placeholder="Código">
        <input id="stock" type="number" placeholder="Stock">
        <input id="precio" type="number" placeholder="Precio">

        <div class="modal-buttons">
            <button onclick="closeModal()">Cancelar</button>
            <button class="btn-add" onclick="guardar()">Guardar</button>
        </div>
    </div>
</div>


<script>
let editRow = null;

function openModal(){
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
    clearForm();
}

function clearForm(){
    document.getElementById("nombre").value="";
    document.getElementById("codigo").value="";
    document.getElementById("stock").value="";
    document.getElementById("precio").value="";
    editRow=null;
}

function guardar(){

    let nombre = document.getElementById("nombre").value;
    let codigo = document.getElementById("codigo").value;
    let stock = document.getElementById("stock").value;
    let precio = document.getElementById("precio").value;

    if(!nombre) return alert("Nombre requerido");

    if(editRow){
        editRow.children[0].innerText = nombre;
        editRow.children[1].innerText = codigo;
        editRow.children[2].innerText = stock;
        editRow.children[3].innerText = "$" + precio;
    }else{

        let tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${nombre}</td>
            <td>${codigo}</td>
            <td>${stock}</td>
            <td>$${precio}</td>
            <td>
                <button class="action-btn edit">Editar</button>
                <button class="action-btn delete">Eliminar</button>
            </td>
        `;

        document.getElementById("tbody").appendChild(tr);
    }

    closeModal();
}

document.addEventListener("click", function(e){

    if(e.target.classList.contains("delete")){
        e.target.closest("tr").remove();
    }

    if(e.target.classList.contains("edit")){
        editRow = e.target.closest("tr");

        document.getElementById("nombre").value = editRow.children[0].innerText;
        document.getElementById("codigo").value = editRow.children[1].innerText;
        document.getElementById("stock").value = editRow.children[2].innerText;
        document.getElementById("precio").value = editRow.children[3].innerText.replace("$","");

        openModal();
    }

});

document.getElementById("search").addEventListener("keyup", function(){
    let filtro = this.value.toLowerCase();
    let filas = document.querySelectorAll("#tbody tr");

    filas.forEach(f => {
        f.style.display = f.innerText.toLowerCase().includes(filtro) ? "" : "none";
    });
});
</script>

{% endblock %}
