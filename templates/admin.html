{% extends 'base.html' %}
{% block titulo %}
MORTAL
{% endblock %}
{% block contenido %}

<h1>Panel Admin</h1>

<a href="/logout">Cerrar sesión</a>

<hr>

<form method="POST" action="/crear">

    <input
        type="text"
        name="nombre"
        placeholder="Nombre"
        required
    >

    <input
        type="number"
        step="0.01"
        name="precio"
        placeholder="Precio"
        required
    >

    <input
        type="text"
        name="coleccion"
        placeholder="Colección"
        required
    >

    <input
        type="text"
        name="imagen"
        placeholder="URL imagen"
        required
    >

    <button type="submit">
        Crear producto
    </button>

</form>

<hr>

{% for p in productos %}

<div>

    <h2>{{ p.nombre }}</h2>

    <p>$ {{ p.precio }}</p>

    <p>{{ p.coleccion }}</p>

    <a href="/editar/{{ p.id }}">
        Editar
    </a>

    <a href="/eliminar/{{ p.id }}">
        Eliminar
    </a>

</div>

<hr>

{% endfor %}

{% endblock %}
