{% extends 'base.html' %}
{% block titulo %}
MORTAL
{% endblock %}
{% block contenido %}

<div class="productos">

{% for p in productos %}

<div class="card">

    {% if p.imagen %}
        <img src="{{ p.imagen }}">
    {% endif %}

    <h2>{{ p.nombre }}</h2>

    <p>{{ p.coleccion }}</p>

    <h3>$ {{ p.precio }}</h3>

    <a href="/agregar/{{ p.id }}">
        Agregar
    </a>

</div>

{% endfor %}

</div>

{% endblock %}
