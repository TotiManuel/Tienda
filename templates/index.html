<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>

    <h1>Tienda de Ropa</h1>

    <nav>
        <a href="/carrito">Carrito</a>
        <a href="/panel-privado">Admin</a>
    </nav>

</header>

<div class="productos">

{% for p in productos %}

<div class="card">
    

    {% if p.imagen %}
        <img src="{{ p.imagen }}">
    {% endif %}

    <h2>{{ p.nombre }}</h2>

    <p>{{ p.coleccion }}</p>

    <h3>$ {{ p.precio }}</h3>

    <a href="/agregar/{{ p.id }}">
        Agregar al carrito
    </a>

</div>

{% endfor %}

</div>

</body>
</html>
