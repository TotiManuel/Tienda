<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda</title>

    <style>

        /* Reset */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #ffffff;
            color: #000;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 35px;
            border-bottom: 1px solid #e5e5e5;
            background: white;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 2px;
            font-weight: 600;
        }

        nav a {
            margin-left: 18px;
            text-decoration: none;
            color: black;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            opacity: 0.7;
        }

        /* Productos */
        .productos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 1100px;
            margin: auto;
        }

        /* Card */
        .card {
            background: black;
            color: white;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        /* Hover */
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* Luz animada */
        .card::before {
            content: "";
            position: absolute;
            top: -100%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255,255,255,0.2),
                transparent
            );
            transform: rotate(25deg);
            transition: 0.6s;
        }

        .card:hover::before {
            top: 100%;
        }

        /* Imagen */
        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        /* Textos */
        .card h2 {
            margin: 6px 0;
            font-size: 16px;
            font-weight: 600;
        }

        .card p {
            margin: 4px 0 10px;
            color: #bdbdbd;
            font-size: 13px;
        }

        .card h3 {
            margin: 0 0 14px;
            font-size: 18px;
            font-weight: 500;
        }

        /* Botón */
        .card a {
            display: inline-block;
            padding: 9px 16px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }

        .card a:hover {
            background: #dddddd;
        }

        /* Responsive */
        @media (max-width: 700px) {

            header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .productos {
                grid-template-columns: repeat(2, 1fr);
                padding: 15px;
                gap: 15px;
            }

            .card img {
                height: 180px;
            }

        }

    </style>

</head>
<body>

<header>

    <h1>MORTAL</h1>

    <nav>
        <a href="/carrito">Inicio</a>
        <a href="/carrito">Hombre</a>
        <a href="/carrito">Mujer</a>
        <a href="/carrito">Colecciones</a>
        <a href="/carrito">Carrito</a>
        <a href="/carrito">Atencion al cliente</a>
        <a href="/panel-privado">Admin</a>
    </nav>

</header>

<div class="productos">

{% for p in productos %}

<div class="card">

    {% if p.imagen %}
        <img src="{{ p.imagen }}">
    {% endif %}

    <h2>{{ p.nombre }}</h2>

    <p>{{ p.coleccion }}</p>

    <h3>$ {{ p.precio }}</h3>

    <a href="/agregar/{{ p.id }}">
        Agregar
    </a>

</div>

{% endfor %}

</div>

</body>
</html>
