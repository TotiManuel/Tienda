{% extends 'base.html' %}

{% block titulo %}
MORTAL
{% endblock %}

{% block contenido %}

<section class="admin-container">

    <div class="admin-header">

        <h1 class="admin-title">
            Panel Admin
        </h1>

        <a
            href="/logout"
            class="logout-btn"
        >
            Cerrar sesión
        </a>

    </div>

    <div class="admin-form-container">

        <h2 class="form-title">
            Crear producto
        </h2>

        <form method="POST" action="/crear">

            <input
                type="text"
                name="nombre"
                placeholder="Nombre"
                required
            >

            <input
                type="number"
                step="0.01"
                name="precio"
                placeholder="Precio"
                required
            >

            <input
                type="text"
                name="coleccion"
                placeholder="Coleccion"
            >

            <input
                type="text"
                name="genero"
                placeholder="Genero"
                required
            >

            <input
                type="text"
                name="tallas"
                placeholder="S,M,L,XL"
                required
            >

            <input
                type="text"
                name="imagen"
                placeholder="URL Imagen"
                required
            >

            <button type="submit">
                Crear
            </button>

        </form>

    </div>

    <div class="productos-admin">

        {% for p in productos %}

        <div class="producto-card">

            <img
                src="{{ p.imagen }}"
                class="producto-img"
            >

            <div class="producto-info">

                <h2 class="producto-nombre">
                    {{ p.nombre }}
                </h2>

                <p class="producto-precio">
                    $ {{ p.precio }}
                </p>

                <p class="producto-coleccion">
                    {{ p.coleccion }}
                </p>

            </div>

            <div class="producto-botones">

                <a
                    href="/editar/{{ p.id }}"
                    class="editar-btn"
                >
                    Editar
                </a>

                <a
                    href="/eliminar/{{ p.id }}"
                    class="eliminar-btn"
                >
                    Eliminar
                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</section>

{% endblock %}
