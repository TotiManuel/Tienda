<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda</title>

    <style>

        /* Reset */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #ffffff;
            color: #000;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #ddd;
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            letter-spacing: 3px;
            margin: 0;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: black;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            opacity: 0.7;
        }

        /* Productos */
        .productos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px;
        }

        /* Cards negras con animación */
        .card {
            background: black;
            color: white;
            padding: 25px 20px;
            border-radius: 12px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        /* Hover */
        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* Luz animada */
        .card::before {
            content: "";
            position: absolute;
            top: -100%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255,255,255,0.2),
                transparent
            );
            transform: rotate(25deg);
            transition: 0.6s;
        }

        .card:hover::before {
            top: 100%;
        }

        /* Imagen */
        .card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        /* Textos */
        .card h2 {
            margin: 10px 0;
            font-size: 24px;
        }

        .card p {
            color: #bbb;
            margin-bottom: 15px;
        }

        .card h3 {
            margin-bottom: 20px;
            font-size: 28px;
        }

        /* Botón */
        .card a {
            display: inline-block;
            padding: 12px 24px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        .card a:hover {
            background: #ddd;
        }

        /* Responsive */
        @media (max-width: 768px) {

            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .productos {
                padding: 20px;
            }

        }

    </style>

</head>
<body>

<header>

    <h1>Tienda de Ropa</h1>

    <nav>
        <a href="/carrito">Carrito</a>
        <a href="/panel-privado">Admin</a>
    </nav>

</header>

<div class="productos">

{% for p in productos %}

<div class="card">

    {% if p.imagen %}
        <img src="{{ p.imagen }}">
    {% endif %}

    <h2>{{ p.nombre }}</h2>

    <p>{{ p.coleccion }}</p>

    <h3>$ {{ p.precio }}</h3>

    <a href="/agregar/{{ p.id }}">
        Agregar al carrito
    </a>

</div>

{% endfor %}

</div>

</body>
</html>
