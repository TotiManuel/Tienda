{% extends 'base.html' %}

{% block titulo %}
MORTAL
{% endblock %}

{% block contenido %}

<section class="admin-container">

    <div class="admin-header">

        <h1 class="admin-title">
            Panel Admin
        </h1>

        <a
            href="/logout"
            class="logout-btn"
        >
            Cerrar sesión
        </a>

    </div>

    <div class="admin-form-container">

        <h2 class="form-title">
            Crear producto
        </h2>

        <form
            method="POST"
            action="/crear"
            class="admin-form"
        >

            <div class="input-group">

                <label class="input-label">
                    Nombre del producto
                </label>

                <input
                    type="text"
                    name="nombre"
                    placeholder="Nombre"
                    class="admin-input"
                    required
                >

            </div>

            <div class="input-group">

                <label class="input-label">
                    Precio
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="precio"
                    placeholder="Precio"
                    class="admin-input"
                    required
                >

            </div>

            <div class="input-group">

                <label class="input-label">
                    Colección
                </label>

                <input
                    type="text"
                    name="coleccion"
                    placeholder="Colección"
                    class="admin-input"
                    required
                >

            </div>

            <div class="input-group">

                <label class="input-label">
                    URL imagen
                </label>

                <input
                    type="text"
                    name="imagen"
                    placeholder="URL imagen"
                    class="admin-input"
                    required
                >

            </div>

            <button
                type="submit"
                class="crear-btn"
            >
                Crear producto
            </button>

        </form>

    </div>

    <div class="productos-admin">

        {% for p in productos %}

        <div class="producto-card">

            <img
                src="{{ p.imagen }}"
                class="producto-img"
            >

            <div class="producto-info">

                <h2 class="producto-nombre">
                    {{ p.nombre }}
                </h2>

                <p class="producto-precio">
                    $ {{ p.precio }}
                </p>

                <p class="producto-coleccion">
                    {{ p.coleccion }}
                </p>

            </div>

            <div class="producto-botones">

                <a
                    href="/editar/{{ p.id }}"
                    class="editar-btn"
                >
                    Editar
                </a>

                <a
                    href="/eliminar/{{ p.id }}"
                    class="eliminar-btn"
                >
                    Eliminar
                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</section>

{% endblock %}
