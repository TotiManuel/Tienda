{% extends 'base.html' %}
{% block titulo %}
MORTAL
{% endblock %}
{% block contenido %}
<h1>Editar producto</h1>

<form method="POST">

    <input
        type="text"
        name="nombre"
        value="{{ producto.nombre }}"
        required
    >

    <input
        type="number"
        step="0.01"
        name="precio"
        value="{{ producto.precio }}"
        required
    >

    <input
        type="text"
        name="coleccion"
        value="{{ producto.coleccion }}"
        required
    >
    <input
        type="text"
        name="imagen"
        value="{{ producto.imagen }}"
        required
    >

    <button type="submit">
        Guardar
    </button>

</form>

{% endblock %}
