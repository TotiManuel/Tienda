{% extends 'base.html' %}

{% block titulo %}
MORTAL
{% endblock %}

{% block contenido %}

<section class="admin-container">

    <h1>Panel Admin</h1>

    <!-- CREAR PRODUCTO -->

    <form method="POST" action="/crear">

        <input
            type="text"
            name="nombre"
            placeholder="Nombre"
            required
        >

        <input
            type="number"
            step="0.01"
            name="precio"
            placeholder="Precio"
            required
        >

        <input
            type="text"
            name="genero"
            placeholder="Genero"
            required
        >

        <input
            type="text"
            name="tallas"
            placeholder="S,M,L,XL"
            required
        >

        <input
            type="text"
            name="imagen"
            placeholder="URL Imagen"
            required
        >

        <!-- COLECCION -->

        <select name="coleccion_id">

            <option value="">
                Sin coleccion
            </option>

            {% for c in colecciones %}

            <option value="{{ c.id }}">
                {{ c.nombre }}
            </option>

            {% endfor %}

        </select>

        <!-- OFERTA -->

        <select name="oferta_id">

            <option value="">
                Sin oferta
            </option>

            {% for o in ofertas %}

            <option value="{{ o.id }}">
                {{ o.nombre }}
            </option>

            {% endfor %}

        </select>

        <!-- PROMOCION -->

        <select name="promocion_id">

            <option value="">
                Sin promocion
            </option>

            {% for p in promociones %}

            <option value="{{ p.id }}">
                {{ p.nombre }}
            </option>

            {% endfor %}

        </select>

        <!-- DESCUENTO -->

        <select name="descuento_id">

            <option value="">
                Sin descuento
            </option>

            {% for d in descuentos %}

            <option value="{{ d.id }}">
                {{ d.nombre }}
                - {{ d.porcentaje }}%
            </option>

            {% endfor %}

        </select>

        <button type="submit">
            Crear Producto
        </button>

    </form>

    <hr>

    <!-- CREAR COLECCION -->

    <form method="POST" action="/crear_coleccion">

        <input
            type="text"
            name="nombre"
            placeholder="Nueva coleccion"
            required
        >

        <button type="submit">
            Crear Coleccion
        </button>

    </form>

    <!-- CREAR OFERTA -->

    <form method="POST" action="/crear_oferta">

        <input
            type="text"
            name="nombre"
            placeholder="Nueva oferta"
            required
        >

        <button type="submit">
            Crear Oferta
        </button>

    </form>

    <!-- CREAR PROMOCION -->

    <form method="POST" action="/crear_promocion">

        <input
            type="text"
            name="nombre"
            placeholder="Nueva promocion"
            required
        >

        <button type="submit">
            Crear Promocion
        </button>

    </form>

    <!-- CREAR DESCUENTO -->

    <form method="POST" action="/crear_descuento">

        <input
            type="text"
            name="nombre"
            placeholder="Nombre descuento"
            required
        >

        <input
            type="number"
            step="0.01"
            name="porcentaje"
            placeholder="%"
            required
        >

        <button type="submit">
            Crear Descuento
        </button>

    </form>

</section>

{% endblock %}
