
{% extends 'base.html' %}

{% block titulo %}
MORTAL
{% endblock %}

{% block contenido %}

<section class="editar-container">

    <div class="editar-card">

        <div class="editar-header">

            <h1 class="editar-title">
                Editar producto
            </h1>

            <p class="editar-subtitle">
                Modificá la información del producto
            </p>

        </div>

        <form
            method="POST"
            class="editar-form"
        >

            <div class="input-group">

                <label class="input-label">
                    Nombre del producto
                </label>

                <input
                    type="text"
                    name="nombre"
                    value="{{ producto.nombre }}"
                    class="editar-input"
                    required
                >

            </div>

            <div class="input-group">

                <label class="input-label">
                    Precio
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="precio"
                    value="{{ producto.precio }}"
                    class="editar-input"
                    required
                >

            </div>

            <div class="input-group">

                <label class="input-label">
                    Colección
                </label>

                <input
                    type="text"
                    name="coleccion"
                    value="{{ producto.coleccion }}"
                    class="editar-input"
                    required
                >

            </div>

            <div class="input-group">

                <label class="input-label">
                    URL imagen
                </label>

                <input
                    type="text"
                    name="imagen"
                    value="{{ producto.imagen }}"
                    class="editar-input"
                    required
                >

            </div>

            <div class="preview-container">

                <p class="preview-text">
                    Vista previa
                </p>

                <img
                    src="{{ producto.imagen }}"
                    class="preview-img"
                >

            </div>

            <div class="editar-actions">

                <button
                    type="submit"
                    class="guardar-btn"
                >
                    Guardar cambios
                </button>

                <a
                    href="/admin"
                    class="volver-btn"
                >
                    Volver
                </a>

            </div>

        </form>

    </div>

</section>

{% endblock %}
